services:
  postgres:
    image: postgres:16-alpine
    container_name: lisani-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lisani_ecdad}
      POSTGRES_USER: ${DB_USERNAME:-lisani}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lisani_secret}
    volumes:
      - lisani_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-lisani} -d ${DB_DATABASE:-lisani_ecdad}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lisani_pgdata:
