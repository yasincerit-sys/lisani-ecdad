# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → bu repo

services:
  - type: web
    name: lisani-ecdad
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_NAME
        value: "Lisanı Ecdad"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: lisani-db
          property: connectionString
      - key: RUN_SEED
        value: "true"
      - key: LISANI_KILL_SWITCH
        value: "false"
      - key: LISANI_DONATE_URL
        sync: false
      - key: LISANI_DONATE_PAYPAL_ME
        value: "false"
      - key: LISANI_DONATE_IBAN
        sync: false
      - key: LISANI_APK_URL
        sync: false

databases:
  - name: lisani-db
    plan: free
    databaseName: lisani_ecdad
    user: lisani
